# ==========================================================
# McGuffin PR / Push Testing
# Runs on every push and pull request to verify:
#   1. Frontend: install → build → test
#   2. Backend:  test (unit + integration)
# on Windows / macOS / Linux
# ==========================================================

name: Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────
      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 🦀 Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # ── Node.js ────────────────────────────────────────
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # ── Frontend ───────────────────────────────────────
      - name: 🌐 Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: 🌐 Build frontend (type-check + Vite)
        working-directory: web
        run: npm run build

      - name: 🌐 Run frontend tests
        working-directory: web
        run: npm test

      # ── Backend ────────────────────────────────────────
      - name: 🦀 Run backend unit + integration tests
        working-directory: server
        run: cargo test

      # ── Summary ─────────────────────────────────────────
      - name: ✅ All checks passed
        run: echo "✓ Frontend build + test passed on ${{ runner.os }}"

  # ==========================================================
  # Nightly Build
  # Builds release binaries on pushes to main, uploads as
  # artifacts so they can be downloaded for testing.
  # ==========================================================
  nightly-build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────
      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 🦀 Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # ── Node.js (needed for frontend build) ─────────────
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # ── Frontend ────────────────────────────────────────
      - name: 🌐 Build frontend
        working-directory: web
        run: npm ci && npm run build

      # ── Backend ─────────────────────────────────────────
      - name: 🔨 Build backend (release)
        working-directory: server
        run: cargo build --release

      # ── Verify ──────────────────────────────────────────
      - name: 🔍 Verify CLI binary
        working-directory: server/target/release
        shell: bash
        run: |
          EXT=""
          [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          echo "::group::Binary info"
          ls -lh "mcguffin${EXT}" "mcguffin-server${EXT}"
          echo "::endgroup::"
          echo "::group::CLI --help"
          ./mcguffin${EXT} --help
          echo "::endgroup::"

      # ── Integration test (Linux/macOS only) ──────────────
      - name: 🧪 Smoke test API
        if: runner.os != 'Windows'
        shell: bash
        working-directory: server
        env:
          ADMIN_PASSWORD: ci_test_pass2025
          SITE_URL: http://localhost:3000
        run: |
          BIN="target/release/mcguffin-server"

          # Start server in background
          echo "::group::Starting server..."
          $BIN &
          SERVER_PID=$!

          # Wait for server to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -s "http://localhost:3000/api/site/info" > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Test public endpoints
          echo "::group::GET /api/site/info"
          curl -s "http://localhost:3000/api/site/info" | python3 -m json.tool
          echo "::endgroup::"

          echo "::group::GET /api/site/difficulties"
          curl -s "http://localhost:3000/api/site/difficulties" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Difficulty levels: {len(d[\"levels\"])}')"
          echo "::endgroup::"

          echo "::group::GET /api/announcements"
          curl -s "http://localhost:3000/api/announcements" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Announcements: {len(d)}')"
          echo "::endgroup::"

          echo "::group::GET /api/problems"
          curl -s "http://localhost:3000/api/problems" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Problems: {len(d)}')"
          echo "::endgroup::"

          echo "::group::GET /api/contests"
          curl -s "http://localhost:3000/api/contests" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Contests: {len(d)}')"
          echo "::endgroup::"

          # Test merged login endpoint (no identifier = admin backward compatible)
          echo "::group::POST /api/auth/login (admin)"
          LOGIN_RESP=$(curl -s -X POST "http://localhost:3000/api/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"password":"ci_test_pass2025"}')
          TOKEN=$(echo "$LOGIN_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          if [ -n "$TOKEN" ]; then
            echo "Admin login OK (token received)"
          else
            echo "Admin login FAILED"
            echo "$LOGIN_RESP"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::GET /api/user/me (authenticated)"
          curl -s "http://localhost:3000/api/user/me" -H "Authorization: Bearer ${TOKEN}" | \
            python3 -c "import sys,json; u=json.load(sys.stdin); print(f'User: {u.get(\"display_name\")} ({u.get(\"role\")})')"
          echo "::endgroup::"

          echo "::group::GET /api/team/members (authenticated)"
          curl -s "http://localhost:3000/api/team/members" -H "Authorization: Bearer ${TOKEN}" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Team members: {len(d)}')"
          echo "::endgroup::"

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          echo "✅ All API smoke tests passed"

      # ── Upload ──────────────────────────────────────────
      - name: 📦 Upload nightly build
        uses: actions/upload-artifact@v4
        with:
          name: mcguffin-nightly-${{ runner.os }}-${{ github.sha }}
          path: |
            server/target/release/mcguffin-server${{ runner.os == 'Windows' && '.exe' || '' }}
            server/target/release/mcguffin${{ runner.os == 'Windows' && '.exe' || '' }}
            web/dist/
          retention-days: 7
          if-no-files-found: error
