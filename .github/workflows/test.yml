# ==========================================================
# McGuffin PR / Push Testing
# Runs on every push and pull request to verify:
#   1. Frontend: install → build → test
#   2. Backend:  test (unit + integration)
# on Windows / macOS / Linux
# ==========================================================

name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      # ── Rust ────────────────────────────────────────────
      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 🦀 Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # ── Bun ───────────────────────────────────────────
      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2

      # ── Frontend ───────────────────────────────────────
      - name: 🌐 Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: 🌐 Build frontend (type-check + Vite)
        working-directory: web
        run: bun run build

      - name: 🌐 Run frontend tests
        working-directory: web
        run: bun run test

      # ── Backend ────────────────────────────────────────
      - name: 🦀 Run backend unit + integration tests
        working-directory: server
        run: cargo test

      # ── Summary ─────────────────────────────────────────
      - name: ✅ All checks passed
        run: echo "✓ Frontend build + test passed on ${{ runner.os }}"
