# ==========================================================
# McGuffin Build & Release
# Triggers on version tags (v*.*.*) to:
#   1. Build frontend + backend on Windows/macOS/Linux
#   2. Run all tests
#   3. Package binaries + web-dist into archives
#   4. Upload to GitHub Releases
# ==========================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────
      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 🦀 Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # ── Node.js ────────────────────────────────────────
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # ── Frontend ───────────────────────────────────────
      - name: 🌐 Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: 🌐 Build frontend
        working-directory: web
        run: npm run build

      - name: 🌐 Run frontend tests
        working-directory: web
        run: npm test

      # ── Backend ────────────────────────────────────────
      - name: 🦀 Run backend unit + integration tests
        working-directory: server
        run: cargo test

      - name: 🦀 Build backend & CLI (release)
        working-directory: server
        run: cargo build --release

      # ── Archive ─────────────────────────────────────────
      - name: 📦 Package artifacts
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          SUFFIX="${{ matrix.binary_suffix }}"
          PKG_DIR="mcguffin-v${TAG}-${TARGET}"

          echo "→ Packaging ${PKG_DIR}"

          # Staging directory
          mkdir -p "release/${PKG_DIR}"

          # Copy server binary
          cp "server/target/release/mcguffin-server${SUFFIX}" "release/${PKG_DIR}/"

          # Copy CLI binary
          cp "server/target/release/mcguffin${SUFFIX}" "release/${PKG_DIR}/"

          # Copy frontend dist (production build of SPA)
          cp -r web/dist "release/${PKG_DIR}/web-dist"

          # Create archive
          cd release
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a -tzip "../${PKG_DIR}.zip" "${PKG_DIR}/"
          else
            tar czf "../${PKG_DIR}.tar.gz" "${PKG_DIR}/"
          fi
          cd ..

          echo "✓ Created ${PKG_DIR}.${{ matrix.archive_ext }}"
          ls -lh "*.tar.gz" "*.zip" 2>/dev/null || true

      # ── Upload to Release ───────────────────────────────
      - name: 🚀 Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mcguffin-*-${{ matrix.target }}.*
          generate_release_notes: true
          fail_on_unmatched_files: false
