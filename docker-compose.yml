version: "3.9"

services:
  mcguffin:
    image: ghcr.io/deng2010/mcguffin:v0.3.0
    container_name: mcguffin
    restart: unless-stopped
    # 多架构镜像：Docker 自动选择 amd64 (Intel/AMD) 或 arm64 (Apple Silicon/ARM 服务器)
    ports:
      - "3000:3000"
    environment:
      - SITE_URL=https://lba-oi.team
      - SITE_NAME=『LBA-OI』
      - MCGUFFIN_DATA_DIR=/app/data
      - TZ=Asia/Shanghai
    volumes:
      - /usr/local/lib/mcguffin:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mcguffin_data:
