version: "3.9"

services:
  mcguffin:
    image: mcguffin:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcguffin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 必要配置
      - SITE_URL=http://localhost:3000
      - ADMIN_PASSWORD=***      # 可选配置
      - SITE_NAME=McGuffin
      - ADMIN_DISPLAY_NAME=管理员
      - MCGUFFIN_DATA_DIR=/app/data
      - MCGUFFIN_WEB_DIST=/app/web/dist
      - TZ=Asia/Shanghai
    volumes:
      - mcguffin_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mcguffin_data:
